<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Red Damien Entertainment</title>
    <link rel="stylesheet" href="styles/attendance.css">
    <link rel="stylesheet" href="styles/usermanagement.css">
    <style>
        /* Audit log specific styles */
        .audit-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .audit-filters .form-inline {
            flex: 0 0 auto;
        }

        .action-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .action-ADDED    { background: #d4edda; color: #155724; }
        .action-EDITED   { background: #cce5ff; color: #004085; }
        .action-REMOVED  { background: #f8d7da; color: #721c24; }
        .action-APPROVED { background: #d4edda; color: #155724; }
        .action-REJECTED { background: #f8d7da; color: #721c24; }
        .action-ROLE_CHANGED { background: #fff3cd; color: #856404; }

        .target-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #e9ecef;
            color: #495057;
        }
        .target-EMPLOYEE { background: #0d6efd18; color: #0d6efd; }
        .target-USER     { background: #6f42c118; color: #6f42c1; }

        .audit-details {
            font-size: 0.82rem;
            color: #666;
            max-width: 320px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audit-time {
            font-size: 0.8rem;
            color: #888;
            white-space: nowrap;
        }

        .audit-user {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .audit-user-name {
            font-weight: 600;
            font-size: 0.88rem;
            color: #1a1a2e;
        }
        .audit-user-role {
            font-size: 0.75rem;
            color: #888;
        }

        .audit-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .audit-stat-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.04);
        }
        .audit-stat-icon {
            font-size: 1.5rem;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            background: #fef2f4;
            border-radius: 10px;
        }
        .audit-stat-num {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a2e;
        }
        .audit-stat-lbl {
            font-size: 0.78rem;
            color: #888;
        }

        @media (max-width: 768px) {
            .audit-stats { grid-template-columns: 1fr 1fr; }
            .audit-details { max-width: 180px; }
        }
        @media (max-width: 480px) {
            .audit-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">🎬</span>
            <span class="sidebar-brand">Red Damien APS</span>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <button class="nav-item logout-btn" id="logoutBtn">
                <span class="nav-icon">🚪</span>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h2 class="page-title">Audit Log</h2>
            <div class="user-info-bar">
                <span class="user-name" id="currentUser">Admin</span>
                <span class="user-role-badge" id="currentRole">Admin</span>
            </div>
        </header>

        <div class="content-area">
            <!-- Stats -->
            <div class="audit-stats">
                <div class="audit-stat-card">
                    <div class="audit-stat-icon">📝</div>
                    <div>
                        <div class="audit-stat-num" id="statTotal">0</div>
                        <div class="audit-stat-lbl">Total Actions</div>
                    </div>
                </div>
                <div class="audit-stat-card">
                    <div class="audit-stat-icon">➕</div>
                    <div>
                        <div class="audit-stat-num" id="statAdded">0</div>
                        <div class="audit-stat-lbl">Added</div>
                    </div>
                </div>
                <div class="audit-stat-card">
                    <div class="audit-stat-icon">✏️</div>
                    <div>
                        <div class="audit-stat-num" id="statEdited">0</div>
                        <div class="audit-stat-lbl">Edited</div>
                    </div>
                </div>
                <div class="audit-stat-card">
                    <div class="audit-stat-icon">🗑️</div>
                    <div>
                        <div class="audit-stat-num" id="statRemoved">0</div>
                        <div class="audit-stat-lbl">Removed</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="section-controls">
                <div class="control-left audit-filters">
                    <div class="form-inline">
                        <label for="searchInput">Search</label>
                        <input type="text" id="searchInput" placeholder="User, target name...">
                    </div>
                    <div class="form-inline">
                        <label for="actionFilter">Action</label>
                        <select id="actionFilter">
                            <option value="">All Actions</option>
                            <option value="ADDED">Added</option>
                            <option value="EDITED">Edited</option>
                            <option value="REMOVED">Removed</option>
                            <option value="APPROVED">Approved</option>
                            <option value="REJECTED">Rejected</option>
                            <option value="ROLE_CHANGED">Role Changed</option>
                        </select>
                    </div>
                    <div class="form-inline">
                        <label for="targetFilter">Target</label>
                        <select id="targetFilter">
                            <option value="">All Targets</option>
                            <option value="EMPLOYEE">Employee</option>
                            <option value="USER">User</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="data-table" id="auditTable">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Performed By</th>
                            <th>Action</th>
                            <th>Target</th>
                            <th>Target Name</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody">
                        <tr><td colspan="6" class="empty-state">Loading audit log...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="scripts/auth.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        const tableBody    = document.getElementById('auditTableBody');
        const searchInput  = document.getElementById('searchInput');
        const actionFilter = document.getElementById('actionFilter');
        const targetFilter = document.getElementById('targetFilter');
        const logoutBtn    = document.getElementById('logoutBtn');
        const menuToggle   = document.getElementById('menuToggle');
        const sidebar      = document.getElementById('sidebar');

        let allEntries = [];

        // Sidebar toggle
        if (menuToggle) {
            menuToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
        }

        // Logout
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('sessionToken');
                localStorage.removeItem('userData');
                window.location.href = 'login.html';
            });
        }

        // Load audit log
        function loadAuditLog() {
            fetch('/payroll/api/audit-log')
                .then(r => r.json())
                .then(data => {
                    allEntries = data;
                    updateStats();
                    renderTable();
                })
                .catch(err => {
                    console.error('Error loading audit log:', err);
                    tableBody.innerHTML = '<tr><td colspan="6" class="empty-state">Failed to load audit log.</td></tr>';
                });
        }

        function updateStats() {
            document.getElementById('statTotal').textContent   = allEntries.length;
            document.getElementById('statAdded').textContent    = allEntries.filter(e => e.action === 'ADDED').length;
            document.getElementById('statEdited').textContent   = allEntries.filter(e => e.action === 'EDITED').length;
            document.getElementById('statRemoved').textContent  = allEntries.filter(e => e.action === 'REMOVED').length;
        }

        function renderTable() {
            const search = (searchInput.value || '').toLowerCase();
            const action = actionFilter.value;
            const target = targetFilter.value;

            const filtered = allEntries.filter(e => {
                const matchSearch = !search ||
                    (e.userName || '').toLowerCase().includes(search) ||
                    (e.targetName || '').toLowerCase().includes(search) ||
                    (e.details || '').toLowerCase().includes(search);
                const matchAction = !action || e.action === action;
                const matchTarget = !target || e.targetType === target;
                return matchSearch && matchAction && matchTarget;
            });

            if (filtered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="empty-state">No audit log entries found.</td></tr>';
                return;
            }

            tableBody.innerHTML = filtered.map(e => {
                const dt = e.createdAt ? formatDateTime(e.createdAt) : '—';
                const actionBadge = '<span class="action-badge action-' + esc(e.action) + '">' + esc(e.action.replace('_', ' ')) + '</span>';
                const targetBadge = '<span class="target-badge target-' + esc(e.targetType) + '">' + esc(e.targetType) + '</span>';
                const roleLabel = formatRole(e.userRole);

                return '<tr>' +
                    '<td class="audit-time">' + dt + '</td>' +
                    '<td><div class="audit-user"><span class="audit-user-name">' + esc(e.userName) + '</span><span class="audit-user-role">' + roleLabel + '</span></div></td>' +
                    '<td>' + actionBadge + '</td>' +
                    '<td>' + targetBadge + '</td>' +
                    '<td><strong>' + esc(e.targetName || '—') + '</strong></td>' +
                    '<td class="audit-details" title="' + esc(e.details || '') + '">' + esc(e.details || '—') + '</td>' +
                    '</tr>';
            }).join('');
        }

        function formatDateTime(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
        }

        function formatRole(role) {
            const labels = {
                business_owner: 'Business Owner',
                operations_manager: 'Operations Manager',
                finance_staff: 'Finance Staff',
                admin_assistant: 'Admin Assistant',
                fulltime_employee: 'Full-Time Employee',
                pending: 'Pending'
            };
            return labels[role] || role || '—';
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        // Filters
        searchInput.addEventListener('input', renderTable);
        actionFilter.addEventListener('change', renderTable);
        targetFilter.addEventListener('change', renderTable);

        // Init
        loadAuditLog();
    });
    </script>
</body>
</html>
