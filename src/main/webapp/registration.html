<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>User Registration - Payroll Management System</title>
    <link rel="stylesheet" href="styles/registration.css">
    <script>
    /* ── AppNotice inlined for cache-proof delivery ── */
    (function(){
        'use strict';
        var STYLE_ID='rd-app-notice-styles',OVERLAY_ID='rdAppNoticeOverlay';
        function ensureStyles(){
            if(document.getElementById(STYLE_ID))return;
            var s=document.createElement('style');s.id=STYLE_ID;
            s.textContent='.rd-notice-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(8,10,16,.58);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:9999;animation:rdFadeIn .2s ease-out}.rd-notice-window{width:min(560px,96vw);border-radius:18px;overflow:hidden;background:#fff;border:1px solid rgba(196,30,58,.22);box-shadow:0 24px 65px rgba(0,0,0,.35);transform:translateY(8px) scale(.98);animation:rdPopIn .22s ease-out forwards}.rd-notice-head{background:linear-gradient(135deg,#c41e3a 0%,#8b0000 100%);color:#fff;display:flex;align-items:center;gap:10px;padding:16px 20px;font-weight:700;font-size:1.05rem;letter-spacing:.2px}.rd-notice-icon{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.18);display:inline-flex;align-items:center;justify-content:center;font-size:1rem}.rd-notice-body{padding:20px;color:#1f2937;line-height:1.6;font-size:1rem}.rd-notice-foot{display:flex;justify-content:flex-end;gap:10px;padding:0 20px 20px}.rd-notice-btn{border:none;border-radius:10px;padding:11px 20px;font-size:.92rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#c41e3a 0%,#8b0000 100%);box-shadow:0 8px 20px rgba(196,30,58,.35);cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}.rd-notice-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(196,30,58,.42)}.rd-notice-btn:active{transform:translateY(0)}.rd-notice-btn-secondary{background:#e5e7eb;color:#1f2937;box-shadow:none}.rd-notice-btn-secondary:hover{background:#d1d5db;transform:translateY(-1px);box-shadow:none}@keyframes rdFadeIn{from{opacity:0}to{opacity:1}}@keyframes rdPopIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}';
            document.head.appendChild(s);
        }
        function closeNotice(cb){var o=document.getElementById(OVERLAY_ID);if(o)o.remove();if(typeof cb==='function')cb();}
        function show(msg,opts){
            ensureStyles();
            var c=document.getElementById(OVERLAY_ID);if(c)c.remove();
            opts=opts||{};
            var title=opts.title||'Red Damien APS',btnTxt=opts.buttonText||'Continue',
                showSec=!!opts.secondaryButtonText,secTxt=opts.secondaryButtonText||'Cancel',
                onC=opts.onConfirm,onS=opts.onSecondary;
            var ov=document.createElement('div');ov.id=OVERLAY_ID;ov.className='rd-notice-overlay';
            ov.innerHTML='<div class="rd-notice-window" role="dialog" aria-modal="true" aria-label="'+title+'"><div class="rd-notice-head"><span class="rd-notice-icon">🎬</span><span>'+title+'</span></div><div class="rd-notice-body"></div><div class="rd-notice-foot">'+(showSec?'<button type="button" class="rd-notice-btn rd-notice-btn-secondary">'+secTxt+'</button>':'')+'<button type="button" class="rd-notice-btn">'+btnTxt+'</button></div></div>';
            ov.querySelector('.rd-notice-body').textContent=msg;
            ov.querySelector('.rd-notice-btn').addEventListener('click',function(){closeNotice(onC);});
            var sb=ov.querySelector('.rd-notice-btn-secondary');if(sb)sb.addEventListener('click',function(){closeNotice(onS);});
            ov.addEventListener('click',function(e){if(e.target===ov)closeNotice(onC);});
            document.body.appendChild(ov);
        }
        function confirm(msg,opts){opts=opts||{};show(msg,{title:opts.title||'Please Confirm',buttonText:opts.confirmText||'Confirm',secondaryButtonText:opts.cancelText||'Cancel',onConfirm:opts.onConfirm,onSecondary:opts.onCancel});}
        window.AppNotice={show:show,confirm:confirm};
        window.alert=function(m){try{show(String(m||''),{title:'Notice',buttonText:'OK'});}catch(e){}};
    })();
    </script>
</head>
<body>
    <!-- Back Button -->
    <a href="index.html" class="back-button">
        <span class="back-icon">←</span>
        <span class="back-text">Back to Home</span>
    </a>

    <div class="registration-container">
        <div class="registration-card">
            <div class="registration-header">
                <h1>Join Red Damien Payroll System</h1>
                <p>🎬 Create Your Account for Event Production Management</p>
            </div>

            <form id="registrationForm" class="registration-form">
                
                <!-- First Name Field -->
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="Enter your first name" 
                        required
                    >
                    <span class="error-message" id="firstNameError"></span>
                </div>

                <!-- Last Name Field -->
                <div class="form-group">
                    <label for="lastName">Last Name *</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Enter your last name" 
                        required
                    >
                    <span class="error-message" id="lastNameError"></span>
                </div>
                
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email" 
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>



                <!-- Address Field -->
                <div class="form-group">
                    <label for="address">Address *</label>
                    <input 
                        type="text" 
                        id="address" 
                        name="address" 
                        placeholder="123 Main St, Quezon City" 
                        required
                    >
                    <span class="error-message" id="addressError"></span>
                </div>

                <!-- Cellphone Field -->
                <div class="form-group">
                    <label for="cellphone">Cellphone Number *</label>
                    <input 
                        type="tel" 
                        id="cellphone" 
                        name="cellphone" 
                        placeholder="09171234567" 
                        required
                    >
                    <span class="error-message" id="cellphoneError"></span>
                </div>

                <!-- Skill Field -->
                <div class="form-group">
                    <label for="skill">Skill *</label>
                    <input 
                        type="text" 
                        id="skill" 
                        name="skill" 
                        placeholder="e.g., Lighting, Audio Mixing, Sound Engineering" 
                        required
                    >
                    <span class="error-message" id="skillError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password *</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter password" 
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="icon">👁️</span>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText">Password strength: weak</span>
                    </div>
                    <div class="password-requirements">
                        <p>Password must contain:</p>
                        <ul>
                            <li id="req-length" class="requirement">At least 8 characters</li>
                            <li id="req-uppercase" class="requirement">One uppercase letter (A-Z)</li>
                            <li id="req-lowercase" class="requirement">One lowercase letter (a-z)</li>
                            <li id="req-digit" class="requirement">One digit (0-9)</li>
                        </ul>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm password" 
                            required
                        >
                        <button type="button" class="toggle-password" id="toggleConfirmPassword">
                            <span class="icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Agreement Checkbox -->
                <div class="form-group checkbox-group">
                    <input 
                        type="checkbox" 
                        id="agreement" 
                        name="agreement" 
                        required
                    >
                    <label for="agreement" class="checkbox-label">
                        I agree to the system's terms and access control policies
                    </label>
                    <span class="error-message" id="agreementError"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Create Account</button>

                <!-- Error Message for registration -->
                <div class="error-message" id="registrationError"></div>

                <!-- Login Link -->
                <div class="login-link">
                    <p>Already have an account? <a href="login.html">Log in here</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/app-notice.js?v=20260307-5"></script>
    <script src="scripts/registration.js?v=20260307-5"></script>
</body>
</html>
